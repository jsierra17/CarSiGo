services:
  db:
    image: postgis/postgis:15-3.4
    container_name: carsigo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: carsigo
      POSTGRES_USER: carsigo
      POSTGRES_PASSWORD: carsigo_password
    ports:
      - "5432:5432"
    volumes:
      - carsigo_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carsigo -d carsigo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  carsigo_pgdata:

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: carsigo_staging_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: carsigo_staging
      POSTGRES_USER: staging_user
      POSTGRES_PASSWORD: staging_password_here
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - carsigo_staging

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: carsigo_staging_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - carsigo_staging

  # Laravel App
  app:
    build:
      context: ../../
      dockerfile: deploy/staging/Dockerfile
    container_name: carsigo_staging_app
    restart: unless-stopped
    ports:
      - "9000:9000"
    working_dir: /var/www/html
    volumes:
      - ../../:/var/www/html
    networks:
      - carsigo_staging
    depends_on:
      - postgres
      - redis
    environment:
      - APP_ENV=staging
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: carsigo_staging_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../../:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/sites/:/etc/nginx/sites-available/
    networks:
      - carsigo_staging
    depends_on:
      - app

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  carsigo_staging:
    driver: bridge
